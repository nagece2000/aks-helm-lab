<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKS Helm Lab - Flask App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .info-box {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .label {
            font-weight: 600;
            color: #555;
        }
        .value {
            color: #333;
        }
        .status-connected {
            color: #10b981;
            font-weight: 600;
        }
        .status-disconnected {
            color: #ef4444;
            font-weight: 600;
        }
        .visitor-count {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            margin: 20px 0;
        }
        .footer {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AKS Helm Lab</h1>
        <p class="subtitle">Flask + PostgreSQL on Kubernetes</p>
        
        <div class="info-box">
            <div class="info-row">
                <span class="label">Database Status:</span>
                <span class="value {% if db_status == 'Connected' %}status-connected{% else %}status-disconnected{% endif %}">
                    {{ db_status }}
                </span>
            </div>
            <div class="info-row">
                <span class="label">Application:</span>
                <span class="value">Flask Web Server</span>
            </div>
        </div>

        <div class="visitor-count">{{ visitor_count }}</div>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">Total Visitors</p>

        <div class="footer">
            Deployed with Helm Charts on Azure Kubernetes Service
        </div>
    </div>
</body>
</html>

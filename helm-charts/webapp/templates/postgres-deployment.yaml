apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "webapp.fullname" . }}-postgresql
  labels:
    {{- include "webapp.labels" . | nindent 4 }}
    app: postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
      - name: postgresql
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: helmdb
        - name: POSTGRES_USER
          value: helmuser
        - name: POSTGRES_PASSWORD
          value: helmpass
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "webapp.fullname" . }}-postgresql
  labels:
    {{- include "webapp.labels" . | nindent 4 }}
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgresql